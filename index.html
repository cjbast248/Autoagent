  <!-- Start Single Page Apps for GitHub Pages -->
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    // This script checks to see if a redirect is present in the query string,
    // converts it back into a correct url and adds it to the
    // browser's history using window.history.replaceState(...),
    // which won't cause the browser to refresh the page. When the
    // React Router loads, it will display the correct page base on the url
    (function (l) {
      if (l.search[1] === 'p' && l.search[2] === '=') {
        var decoded = l.search.slice(3).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <!-- End Single Page Apps for GitHub Pages -->

  <style>
    /* Critical above-the-fold styles to prevent FOUC and improve Speed Index */
    html,

      margin: 0;

      background: #f3f4f6;

      margin-right: 20px;
    }

    .skeleton-content {
      height: 300px;
      background: #f3f4f6;
      border-radius: 8px;
      overflow: hidden;
    }

    .skeleton-shimmer {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

        // Schedule non-critical work during idle time
        const deferredWork = () => {
          // Any heavy initialization can be scheduled here
        };
        deferredWork();
      }, { timeout: 2000 });
    }

    // Use scheduler API if available to yield to browser
    if ('scheduler' in window && 'postTask' in scheduler) {

        // Low priority tasks

    }
